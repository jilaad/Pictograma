<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pictograma</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #fdf6ef;
            margin: 0;
            padding: 12px 20px;
            min-height: 100dvh;
            box-sizing: border-box;
        }

        :root {
            --gap: 8px;
            --hud-height: 52px;
            --hud-margin: 12px;
            --body-padding: 24px;
            --card-size: calc((100dvh - var(--hud-height) - var(--hud-margin) - var(--body-padding) - (4 * var(--gap))) / 5);
        }

       #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: calc(var(--card-size) * 2 + var(--gap));
            height: var(--hud-height);
            background: white;
            border-radius: 16px;
            padding: 0 16px;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: var(--hud-margin);
        }

        #timer {
            font-size: 1.4em;
            font-weight: 700;
            color: #e05c2a;
            letter-spacing: 0.02em;
        }

        #timer.warning {
            color: #cc0000;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        #score {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        #end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #end-content {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 300px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #end-title {
            font-size: 2em;
            margin: 0;
            color: #333;
        }

        #end-stats {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 700;
            color: #333;
        }

        .stat-divider {
            height: 1px;
            background: #eee;
            margin: 4px 0;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        #game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
            width: calc(var(--card-size) * 2 + var(--gap));
        }

        .card {
            width: var(--card-size);
            height: var(--card-size);
            min-height: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            background-color: #fffdf9;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            cursor: pointer;
            text-align: center;
            padding: 0;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .card.selected {
            border-color: #4a90e2;
            border-width: 3px;
        }

        .card.wrong {
            border-color: red;
            background-color: #ffe0e0;
        }

        .card.matched {
            border-color: #2ecc71;
            background-color: #d4f7e7;
        }

        .card.empty {
            background-color: transparent;
            border: 2px dashed #ccc;
            cursor: default;
        }

        #title-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 2rem 1rem;
            width: 100%;
            max-width: 300px;
        }

        #title-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        #title-subtitle-top {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #bbb;
        }

        #title-wordmark {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #title-wordmark h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            margin: 0;
            color: #c94f1e;
            letter-spacing: -0.02em;
        }

        #title-wordmark span {
            font-size: 28px;
        }

        #title-subtitle-bottom {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #bbb;
        }

        #mode-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .mode-button {
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Nunito', sans-serif;
            width: 100%;
        }

        .noun-button {
            background: #c94f1e;
            color: white;
        }

        .verb-button {
            background: #2a7fc9;
            color: white;
        }

        .mode-icon {
            font-size: 18px;
        }

        .mode-arrow {
            opacity: 0.6;
            font-size: 12px;
        }


        #play-buttons {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .secondary-button {
            flex: 1;
            background: white;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }

        #stats-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-label-small {
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .noun-color {
            color: #c94f1e;
        }

        .verb-color {
            color: #2a7fc9;
        }

        .stat-divider-v {
            width: 1px;
            height: 30px;
            background: #eee;
        }

        #preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 460px;
            width: 100%;
            margin-top: 20px;
        }

        .empty-card {
            width: 100%;
            aspect-ratio: 1;
        }

        #stats-screen {
            width: 100%;
            max-width: 360px;
            padding: 12px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #stats-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #stats-header h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: #c94f1e;
            margin: 0;
        }

        .stats-section-title {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #bbb;
            margin-bottom: 8px;
        }

        #stats-accuracy-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .accuracy-card {
            background: white;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .accuracy-label {
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        .accuracy-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #c94f1e;
        }

        #stats-words-section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stats-word-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stats-word-row:last-child {
            border-bottom: none;
        }

        .stats-word-label {
            font-size: 11px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            width: 48px;
        }

        .stats-word-name {
            flex: 1;
            font-weight: 600;
            color: #333;
        }

        .stats-word-pct {
            font-weight: 700;
            color: #c94f1e;
        }

        #stats-chart-section {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        #chart-mode-toggle {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .chart-toggle-button {
            flex: 1;
            padding: 6px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: white;
            font-size: 12px;
            color: #888;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
        }

        .chart-toggle-button.active {
            background: #c94f1e;
            color: white;
            border-color: #c94f1e;
        }

        #accuracy-chart {
            width: 100%;
            height: 160px;
        }

        #stats-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #dev-screen {
            width: 100%;
            max-width: 360px;
            padding: 12px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #dev-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #dev-header h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: #2a7fc9;
            margin: 0;
        }

        #dev-counts {
            background: white;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dev-count-line {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.5;
        }

        #dev-filters {
            display: flex;
            gap: 8px;
        }

        #dev-filters select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            color: #555;
            background: white;
            cursor: pointer;
        }

        #dev-browser {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dev-word-row {
            background: white;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .dev-word-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 8px;
        }

        .dev-word-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #333;
        }

        .dev-word-type {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .dev-word-type.noun {
            background: #fde8e0;
            color: #c94f1e;
        }

        .dev-word-type.verb {
            background: #deeef9;
            color: #2a7fc9;
        }

        .dev-word-themes {
            font-size: 11px;
            color: #bbb;
            margin-bottom: 8px;
        }

        .dev-image-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .dev-image-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .dev-image-thumb:active {
            border-color: #2a7fc9;
        }

        #dev-filename-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            z-index: 200;
            max-width: 90%;
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="title-screen">
        <div id="title-header">
            <div id="title-subtitle-top">learn spanish</div>
            <div id="title-wordmark">
                <span>🇪🇸</span>
                <h1 onclick="handleTitleTap()">Pictograma</h1>
                <span>🇲🇽</span>
            </div>
            <div id="title-subtitle-bottom">image · word · meaning</div>
        </div>

        <div id="mode-select">
            <button class="mode-button noun-button" onclick="selectMode('noun')">
                <span class="mode-icon">🏠</span>
                <span>Noun Mode</span>
                <span class="mode-arrow">▶</span>
            </button>
            <button class="mode-button verb-button" onclick="selectMode('verb')">

                <span>Verb Mode</span>
                <span class="mode-arrow">▶</span>
            </button>

        </div>

        <div id="theme-selector" style="display:none; width:100%">
            <select id="theme-dropdown" onchange="onThemeChange()" style="width:100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #eee; font-family: 'Nunito', sans-serif; font-size: 0.95rem; color: #555; background: white; cursor: pointer;">
                <option value="all">All Words</option>
            </select>
        </div>

        <div id="play-buttons" style="display:none">
            <button class="secondary-button" onclick="launchPreview()">👀 Preview & Play</button>
            <button class="secondary-button" onclick="startGame()">▶ Play</button>
        </div>

        <div id="stats-row">
            <div class="stat-item">
                <div class="stat-number noun-color" id="stat-best-score">0</div>
                <div class="stat-label-small">best score</div>
            </div>
            <div class="stat-divider-v"></div>
            <div class="stat-item">
                <div class="stat-number verb-color" id="stat-words-learned">0</div>
                <div class="stat-label-small">words learned</div>
            </div>
            <div class="stat-divider-v"></div>

        </div>

        <button class="secondary-button" onclick="showStats()" style="width:100%">📊 Stats</button>
    </div>
    <div id="preview-screen" style="display:none">

    </div>
    <div id="stats-screen" style="display:none">

    <script src="words.js"></script>
    <script>
        // --- Configuration ---
        const TOTAL_TIME = 105; // 1:45 in seconds
        const NUM_STACKS = 5;
        const ROUND_SIZE = 90; // Must be a multiple of NUM_STACKS
        const LEARNED_ACCURACY = 0.95;
        const LEARNED_MIN_ATTEMPTS = 20;
        const STATS_MIN_ATTEMPTS = 10;

        // --- Game State ---
        let stacks = { images: [], words: [] };
        let selected = null;
        let score = 0;
        let timeLeft = TOTAL_TIME;
        let timerInterval = null;
        let gameActive = false;
        let selectedMode = "noun";
        let selectedTheme = "all";
        let layerTemplates = [];
        let confettiActive = false;
        let misses = 0;
        let chartMode = "all";
        let titleTapCount = 0;
        let titleTapTimer = null;

        function getWordProgress() {
            try {
                return JSON.parse(localStorage.getItem("wordProgress")) || {};
            } catch {
                return {};
            }
        }

        function saveWordProgress(progress) {
            localStorage.setItem("wordProgress", JSON.stringify(progress));
        }

        function recordMatch(word, correct) {
            const progress = getWordProgress();
            if (!progress[word]) progress[word] = { correct: 0, attempts: 0 };
            progress[word].attempts++;
            if (correct) progress[word].correct++;
            saveWordProgress(progress);
        }

        function getLearnedCount() {
            const progress = getWordProgress();
            return Object.values(progress).filter(w => 
                w.attempts >= LEARNED_MIN_ATTEMPTS && 
                (w.correct / w.attempts) >= LEARNED_ACCURACY
            ).length;
        }

        function recordSession(mode, correct, attempts) {
            const history = JSON.parse(localStorage.getItem("sessionHistory")) || [];
            history.push({
                date: getTodayString(),
                mode: mode,
                correct: correct,
                attempts: attempts
            });
            localStorage.setItem("sessionHistory", JSON.stringify(history));
        }

        function buildRound() {
            const filtered = words.filter(w => {
                if (w.type !== selectedMode) return false;
                if (selectedTheme === "all") return true;
                return w.themes && w.themes.includes(selectedTheme);
            });
            
            // Determine subset size - target 30, biggest multiple of 5 that's <= 30 and <= bank size
            const maxSubset = Math.min(30, filtered.length);
            const subsetSize = Math.floor(maxSubset / NUM_STACKS) * NUM_STACKS;
            
            // Build synonym-safe word subset
            const subset = [];
            const candidates = [...filtered].sort(() => Math.random() - 0.5);
            
            for (const candidate of candidates) {
                if (subset.length >= subsetSize) break;
                
                // Bidirectional synonym check
                const candidateAccepts = candidate.images.flatMap(img => img.accepts || [candidate.word]);
                
                const conflict = subset.some(chosen => {
                    const chosenAccepts = chosen.images.flatMap(img => img.accepts || [chosen.word]);
                    return candidateAccepts.includes(chosen.word) || 
                        chosenAccepts.includes(candidate.word);
                });
                
                if (!conflict) subset.push(candidate);
            }
            
            // Assign fixed stack positions - divide subset into layer templates
            // Shuffle subset first so stack assignment is random
            const shuffledSubset = [...subset].sort(() => Math.random() - 0.5);
            
            // Build layer templates - each is an array of NUM_STACKS words
            layerTemplates = [];
            for (let i = 0; i < shuffledSubset.length; i += NUM_STACKS) {
                layerTemplates.push(shuffledSubset.slice(i, i + NUM_STACKS));
            }
        }

        function buildDeck() {
            // Initialize empty stacks
            const imageDeck = Array.from({ length: NUM_STACKS }, () => []);
            const wordDeck = Array.from({ length: NUM_STACKS }, () => []);
            
            const totalLayers = ROUND_SIZE / NUM_STACKS; // 18 layers for 90 pairs
            let layersDealt = 0;
            let shuffledLayers = [...layerTemplates].sort(() => Math.random() - 0.5);
            let layerIndex = 0;
            let topLayerTemplate = null;
            
            while (layersDealt < totalLayers) {
                // Reshuffle when we run out of layers
                if (layerIndex >= shuffledLayers.length) {
                    shuffledLayers = [...layerTemplates].sort(() => Math.random() - 0.5);
                    layerIndex = 0;
                    
                    // Make sure first layer of new shuffle doesn't match current top layer
                    if (topLayerTemplate && shuffledLayers[0] === topLayerTemplate && shuffledLayers.length > 1) {
                        // Swap with a random other layer
                        const swapIdx = Math.floor(Math.random() * (shuffledLayers.length - 1)) + 1;
                        [shuffledLayers[0], shuffledLayers[swapIdx]] = 
                            [shuffledLayers[swapIdx], shuffledLayers[0]];
                    }
                }
                
                const layer = shuffledLayers[layerIndex++];
                topLayerTemplate = layer;
                
                // Shuffle word positions within this layer for the word deck
                const wordPositions = [...Array(NUM_STACKS).keys()].sort(() => Math.random() - 0.5);
                
                layer.forEach((item, idx) => {
                    // Pick random image for this appearance
                    const randomImage = item.images[Math.floor(Math.random() * item.images.length)];
                    const accepts = randomImage.accepts || [item.word];
                    
                    imageDeck[idx].push({
                        word: item.word,
                        file: randomImage.file,
                        accepts: accepts
                    });
                    wordDeck[wordPositions[idx]].push({
                        word: item.word,
                        file: randomImage.file,
                        accepts: accepts
                    });
                });
                
                layersDealt++;
            }
            
            stacks.images = imageDeck;
            stacks.words = wordDeck;
        }

        function createImageCard(stackIndex) {
            const stack = stacks.images[stackIndex];
            const div = document.createElement("div");

            if (stack.length === 0) {
                div.className = "card empty";
            } else {
                const item = stack[0];
                div.className = "card";
                div.dataset.type = "image";
                div.dataset.stack = stackIndex;
                div.dataset.word = item.word;
                div.dataset.accepts = JSON.stringify(item.accepts);

                const img = document.createElement("img");
                img.src = item.file;
                div.appendChild(img);
                div.addEventListener("click", () => handleCardClick(div));
            }
            return div;
        }

        function createWordCard(stackIndex) {
            const stack = stacks.words[stackIndex];
            const div = document.createElement("div");

            if (stack.length === 0) {
                div.className = "card empty";
            } else {
                const item = stack[0];
                div.className = "card";
                div.dataset.type = "word";
                div.dataset.stack = stackIndex;
                div.dataset.word = item.word;
                div.textContent = item.word;
                div.dataset.accepts = JSON.stringify(item.accepts);
                div.addEventListener("click", () => handleCardClick(div));
            }
            return div;
        }

        function handleCardClick(card) {
            if (!gameActive) return;
            if (card.classList.contains("empty")) return;
            if (card === selected) {
                // Deselect
                card.classList.remove("selected");
                selected = null;
                return;
            }
            if (selected && selected.dataset.type === card.dataset.type) {
                // Can't select two of the same type
                selected.classList.remove("selected");
                selected = card;
                card.classList.add("selected");
                return;
            }

            if (!selected) {
                selected = card;
                card.classList.add("selected");
            } else {
                // We have two cards of different types selected
                const imageCard = selected.dataset.type === "image" ? selected : card;
                const wordCard = selected.dataset.type === "word" ? selected : card;
                const imageAccepts = JSON.parse(imageCard.dataset.accepts);

                if (imageAccepts.includes(wordCard.dataset.word)) {
                    // Match!
                    handleMatch(selected, card);
                } else {
                    // Mismatch
                    handleMismatch(selected, card);
                }
            }
        }

        function handleMatch(card1, card2) {
            score++;
            document.getElementById("score").textContent = "Matches: " + score;

            // Remove top of each stack
            const imageCard = card1.dataset.type === "image" ? card1 : card2;
            const wordCard = card1.dataset.type === "word" ? card1 : card2;

            card1.classList.add("matched");
            card2.classList.add("matched");

            stacks.images[imageCard.dataset.stack].shift();
            stacks.words[wordCard.dataset.stack].shift();

            recordMatch(wordCard.dataset.word, true);
            selected = null;
            

            setTimeout(() => {
                refreshBoard();
                if (stacks.images.every(s => s.length === 0)) {
                    endGame(true);
                }
            }, 300);
        }

        function handleMismatch(card1, card2) {
            card1.classList.add("wrong");
            card2.classList.add("wrong");
            misses++;
            recordMatch(card2.dataset.type === "word" ? card2.dataset.word : card1.dataset.word, false);
            selected = null;

            setTimeout(() => {
                card1.classList.remove("wrong", "selected");
                card2.classList.remove("wrong", "selected");
            }, 600);
        }

        function refreshBoard() {
            const board = document.getElementById("game-board");
            board.innerHTML = "";

            for (let i = 0; i < NUM_STACKS; i++) {
                board.appendChild(createImageCard(i));
                board.appendChild(createWordCard(i));
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById("timer").textContent =
                    mins + ":" + (secs < 10 ? "0" : "") + secs;

                if (timeLeft <= 20) {
                    document.getElementById("timer").classList.add("warning");
                }

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function endGame(won) {
            gameActive = false;
            clearInterval(timerInterval);
            updatePlayStreak();
            const accuracy = score / (score + misses);
            recordSession(selectedMode, score, score + misses);

            const finalScore = score + timeLeft;

            // Personal best
            const pbKey = "pb_" + selectedMode;
            const prevBest = parseInt(localStorage.getItem(pbKey)) || 0;
            const isNewBest = finalScore > prevBest;
            if (isNewBest) localStorage.setItem(pbKey, finalScore);

            // Populate end screen
            document.getElementById("end-title").textContent = won ? "🎉 Cleared!" : "😅 Oh no! Time expired!";
            document.getElementById("end-matches").textContent = score;
            document.getElementById("end-time").textContent = timeLeft + "s";
            document.getElementById("end-score").textContent = finalScore;
            document.getElementById("end-personal-best").textContent = 
                isNewBest ? prevBest > 0 ? "New best! 🏆" : "First run! 🏆" : prevBest;

            // Show end screen
            document.getElementById("game-board").style.display = "none";
            document.getElementById("hud").style.display = "none";
            document.getElementById("end-screen").style.display = "flex";

            if (won) launchConfetti();
        }

        function populateThemeDropdown() {
            const select = document.getElementById("theme-dropdown");
            select.value = "all";
            
            // Collect all unique themes from words matching current mode
            const modeWords = words.filter(w => w.type === selectedMode);
            const themeSet = new Set();
            modeWords.forEach(w => {
                if (w.themes) w.themes.forEach(t => themeSet.add(t));
            });
            
            // Clear existing options except "All Words"
            select.innerHTML = '<option value="all">All Words</option>';
            
            // Sort themes alphabetically and add
            [...themeSet].sort().forEach(theme => {
                const option = document.createElement("option");
                option.value = theme;
                option.textContent = theme.charAt(0).toUpperCase() + theme.slice(1);
                select.appendChild(option);
            });
        }

        function onThemeChange() {
            selectedTheme = document.getElementById("theme-dropdown").value;
            buildRound();
        }


        function selectMode(mode) {
            selectedMode = mode;
            selectedTheme = "all";
            populateThemeDropdown();
            buildRound();
            document.getElementById("theme-selector").style.display = "block";
            document.getElementById("play-buttons").style.display = "flex";
        }

        function launchPreview() {
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("preview-screen").style.display = "block";
            buildPreviewGrid();
        }

        function startGame() {
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("preview-screen").style.display = "none";
            document.getElementById("game-board").style.display = "grid";
            document.getElementById("hud").style.display = "flex";
            buildDeck();
            refreshBoard();
            gameActive = true;
            startTimer();
        }

        function buildPreviewGrid() {
            const grid = document.getElementById("preview-grid");
            grid.innerHTML = "";

            // Get unique words from layerTemplates - flatten the 2D array
            const uniqueWords = layerTemplates.flat();

            uniqueWords.forEach(item => {
                // Word card
                const wordCard = document.createElement("div");
                wordCard.className = "card";
                wordCard.textContent = item.word;
                grid.appendChild(wordCard);

                // Pick up to 3 random images
                const shuffledImages = [...item.images].sort(() => Math.random() - 0.5);
                const previewImages = shuffledImages.slice(0, 3);

                // Add image cards, pad with empty cells if fewer than 3
                for (let i = 0; i < 3; i++) {
                    if (i < previewImages.length) {
                        const imgCard = document.createElement("div");
                        imgCard.className = "card";
                        const img = document.createElement("img");
                        img.src = previewImages[i].file;
                        imgCard.appendChild(img);
                        grid.appendChild(imgCard);
                    } else {
                        const empty = document.createElement("div");
                        empty.className = "empty-card";
                        grid.appendChild(empty);
                    }
                }
            });
        }


        function launchConfetti() {
            const canvas = document.getElementById("confetti-canvas");
            canvas.style.display = "block";
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = Array.from({ length: 150 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                size: Math.random() * 8 + 4,
                color: ["#e05c2a", "#4a90e2", "#2ecc71", "#f1c40f", "#e91e63"][Math.floor(Math.random() * 5)],
                speed: Math.random() * 3 + 2,
                angle: Math.random() * Math.PI * 2,
                spin: (Math.random() - 0.5) * 0.2,
                wobble: Math.random() * 0.05
            }));

            confettiActive = true;

            function draw() {
                if (!confettiActive) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                    p.y += p.speed;
                    p.x += Math.sin(p.angle) * 2;
                    p.angle += p.spin;
                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

    function resetGame() {
        // Reset state
        score = 0;
        timeLeft = TOTAL_TIME;
        selected = null;
        gameActive = false;
        misses = 0;
        selectedTheme = "all";
        document.getElementById("theme-selector").style.display = "none";

        // Hide end screen and confetti
        confettiActive = false;
        document.getElementById("end-screen").style.display = "none";
        document.getElementById("confetti-canvas").style.display = "none";

        // Reset HUD
        document.getElementById("timer").textContent = "1:45";
        document.getElementById("timer").classList.remove("warning");
        document.getElementById("score").textContent = "Matches: 0";
        document.getElementById("hud").style.display = "none";

        updateTitleStats();

        // Go back to title screen
        document.getElementById("title-screen").style.display = "flex";
        document.getElementById("title-screen").style.flexDirection = "column";
        document.getElementById("game-board").style.display = "none";
        document.getElementById("play-buttons").style.display = "none";
    }

    function getTodayString() {
        return new Date().toISOString().split("T")[0]; // "2026-04-19" format
    }

    function updatePlayStreak() {
        const today = getTodayString();
        const lastPlayed = localStorage.getItem("lastPlayed");
        let playStreak = parseInt(localStorage.getItem("playStreak")) || 0;

        if (lastPlayed === today) {
            // Already played today, no change
            return;
        }

        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayString = yesterday.toISOString().split("T")[0];

        if (lastPlayed === yesterdayString) {
            // Played yesterday, increment streak
            playStreak++;
        } else {
            // Gap in play, reset streak
            playStreak = 1;
        }

        localStorage.setItem("playStreak", playStreak);
        localStorage.setItem("lastPlayed", today);
    }

    function updateTitleStats() {
        const pbNoun = parseInt(localStorage.getItem("pb_noun")) || 0;
        const pbVerb = parseInt(localStorage.getItem("pb_verb")) || 0;
        const bestScore = Math.max(pbNoun, pbVerb);
        const playStreak = parseInt(localStorage.getItem("playStreak")) || 0;
        const learnedCount = getLearnedCount();

        document.getElementById("stat-best-score").textContent = bestScore;
        document.getElementById("stat-words-learned").textContent = learnedCount;
        document.getElementById("stat-streak").textContent = playStreak;
    }

    function showStats() {
    buildStats();
    document.getElementById("title-screen").style.display = "none";
    document.getElementById("stats-screen").style.display = "flex";
    document.getElementById("stats-screen").style.flexDirection = "column";
}

function hideStats() {
    document.getElementById("stats-screen").style.display = "none";
    document.getElementById("title-screen").style.display = "flex";
    document.getElementById("title-screen").style.flexDirection = "column";
}

function setChartMode(mode) {
    chartMode = mode;
    document.querySelectorAll(".chart-toggle-button").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    drawChart();
}

function calcAccuracy(sessions, mode) {
    const filtered = mode === "all" ? sessions : sessions.filter(s => s.mode === mode);
    const correct = filtered.reduce((sum, s) => sum + s.correct, 0);
    const attempts = filtered.reduce((sum, s) => sum + s.attempts, 0);
    return attempts === 0 ? null : correct / attempts;
}

function formatPct(value) {
    return value === null ? "—" : Math.round(value * 100) + "%";
}

function buildStats() {
    const sessions = JSON.parse(localStorage.getItem("sessionHistory")) || [];
    const progress = getWordProgress();

    // Accuracy cards
    document.getElementById("stat-overall-accuracy").textContent = formatPct(calcAccuracy(sessions, "all"));
    document.getElementById("stat-noun-accuracy").textContent = formatPct(calcAccuracy(sessions, "noun"));
    document.getElementById("stat-verb-accuracy").textContent = formatPct(calcAccuracy(sessions, "verb"));

    // Best/worst words per mode
    ["noun", "verb"].forEach(mode => {
        const modeWords = words.filter(w => w.type === mode);
        const qualified = modeWords
            .filter(w => progress[w.word] && progress[w.word].attempts >= STATS_MIN_ATTEMPTS)
            .map(w => ({
                word: w.word,
                accuracy: progress[w.word].correct / progress[w.word].attempts
            }))
            .sort((a, b) => b.accuracy - a.accuracy);

        if (qualified.length > 0) {
            const best = qualified[0];
            const worst = qualified[qualified.length - 1];
            document.getElementById(`stat-${mode}-best`).textContent = best.word;
            document.getElementById(`stat-${mode}-best-pct`).textContent = formatPct(best.accuracy);
            document.getElementById(`stat-${mode}-worst`).textContent = worst.word;
            document.getElementById(`stat-${mode}-worst-pct`).textContent = formatPct(worst.accuracy);
        }
    });

    setTimeout(() => drawChart(), 0);
}

function drawChart() {
    const sessions = JSON.parse(localStorage.getItem("sessionHistory")) || [];
    const canvas = document.getElementById("accuracy-chart");
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.offsetWidth;
    canvas.height = 160;

    // Group by date
    const byDate = {};
    sessions.forEach(s => {
        if (chartMode !== "all" && s.mode !== chartMode) return;
        if (!byDate[s.date]) byDate[s.date] = { correct: 0, attempts: 0 };
        byDate[s.date].correct += s.correct;
        byDate[s.date].attempts += s.attempts;
    });

    const dates = Object.keys(byDate).sort();
    const accuracies = dates.map(d => byDate[d].correct / byDate[d].attempts);

    if (dates.length < 2) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#bbb";
        ctx.font = "14px Nunito, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Not enough data yet", canvas.width / 2, canvas.height / 2);
        return;
    }

    const pad = { top: 10, right: 10, bottom: 24, left: 36 };
    const w = canvas.width - pad.left - pad.right;
    const h = canvas.height - pad.top - pad.bottom;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid lines at 25%, 50%, 75%, 100%
    [0.25, 0.5, 0.75, 1].forEach(pct => {
        const y = pad.top + h - (pct * h);
        ctx.beginPath();
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 1;
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + w, y);
        ctx.stroke();
        ctx.fillStyle = "#bbb";
        ctx.font = "10px Nunito, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(Math.round(pct * 100) + "%", pad.left - 4, y + 4);
    });

    // Line
    ctx.beginPath();
    ctx.strokeStyle = "#c94f1e";
    ctx.lineWidth = 2;
    accuracies.forEach((acc, i) => {
        const x = pad.left + (i / (accuracies.length - 1)) * w;
        const y = pad.top + h - (acc * h);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Dots
    accuracies.forEach((acc, i) => {
        const x = pad.left + (i / (accuracies.length - 1)) * w;
        const y = pad.top + h - (acc * h);
        ctx.beginPath();
        ctx.fillStyle = "#c94f1e";
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
    });

    // Date labels — just first and last
    ctx.fillStyle = "#bbb";
    ctx.font = "10px Nunito, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(dates[0].slice(5), pad.left, canvas.height - 4);
    ctx.textAlign = "right";
    ctx.fillText(dates[dates.length - 1].slice(5), pad.left + w, canvas.height - 4);
}


function handleTitleTap() {
    titleTapCount++;
    clearTimeout(titleTapTimer);
    titleTapTimer = setTimeout(() => {
        titleTapCount = 0;
    }, 2000);

    if (titleTapCount >= 5) {
        titleTapCount = 0;
        clearTimeout(titleTapTimer);
        showDevScreen();
    }
}

function showDevScreen() {
    populateDevThemeFilter();
    buildDevCounts();
    buildDevBrowser();
    document.getElementById("title-screen").style.display = "none";
    document.getElementById("dev-screen").style.display = "flex";
    document.getElementById("dev-screen").style.flexDirection = "column";
}

function hideDevScreen() {
    document.getElementById("dev-screen").style.display = "none";
    document.getElementById("title-screen").style.display = "flex";
    document.getElementById("title-screen").style.flexDirection = "column";
}

function populateDevThemeFilter() {
    const select = document.getElementById("dev-theme-filter");
    select.innerHTML = '<option value="all">All Themes</option>';
    const themeSet = new Set();
    words.forEach(w => {
        if (w.themes) w.themes.forEach(t => themeSet.add(t));
    });
    [...themeSet].sort().forEach(theme => {
        const option = document.createElement("option");
        option.value = theme;
        option.textContent = theme.charAt(0).toUpperCase() + theme.slice(1);
        select.appendChild(option);
    });
}

function getDevFiltered() {
    const typeFilter = document.getElementById("dev-type-filter").value;
    const themeFilter = document.getElementById("dev-theme-filter").value;
    return words.filter(w => {
        if (typeFilter !== "all" && w.type !== typeFilter) return false;
        if (themeFilter !== "all" && (!w.themes || !w.themes.includes(themeFilter))) return false;
        return true;
    });
}

function buildDevCounts() {
    const total = words.length;
    const filtered = getDevFiltered().length;

    // Type counts
    const typeCounts = {};
    words.forEach(w => {
        typeCounts[w.type] = (typeCounts[w.type] || 0) + 1;
    });
    const typeString = Object.entries(typeCounts)
        .sort()
        .map(([type, count]) => `${count} ${type}s`)
        .join(", ");

    // Theme counts
    const themeCounts = {};
    words.forEach(w => {
        if (w.themes) w.themes.forEach(t => {
            themeCounts[t] = (themeCounts[t] || 0) + 1;
        });
    });
    const themeString = Object.entries(themeCounts)
        .sort()
        .map(([theme, count]) => `${theme}: ${count}`)
        .join(", ");

    document.getElementById("dev-total-count").textContent = 
        `${total} words total, ${filtered} words filtered`;
    document.getElementById("dev-type-counts").textContent = typeString;
    document.getElementById("dev-theme-counts").textContent = themeString;
}

function buildDevBrowser() {
    buildDevCounts();
    const filtered = getDevFiltered();
    const browser = document.getElementById("dev-browser");
    browser.innerHTML = "";

    filtered.forEach(item => {
        const row = document.createElement("div");
        row.className = "dev-word-row";

        const header = document.createElement("div");
        header.className = "dev-word-header";

        const name = document.createElement("span");
        name.className = "dev-word-name";
        name.textContent = item.word;

        const type = document.createElement("span");
        type.className = `dev-word-type ${item.type}`;
        type.textContent = item.type;

        header.appendChild(name);
        header.appendChild(type);
        row.appendChild(header);

        if (item.themes && item.themes.length > 0) {
            const themes = document.createElement("div");
            themes.className = "dev-word-themes";
            themes.textContent = item.themes.join(", ");
            row.appendChild(themes);
        }

        const imageRow = document.createElement("div");
        imageRow.className = "dev-image-row";

        item.images.forEach(img => {
            const thumb = document.createElement("img");
            thumb.className = "dev-image-thumb";
            thumb.src = img.file;
            thumb.addEventListener("click", () => showFilenameToast(img.file));
            imageRow.appendChild(thumb);
        });

        row.appendChild(imageRow);
        browser.appendChild(row);
    });
}

function showFilenameToast(filename) {
    const toast = document.getElementById("dev-filename-toast");
    toast.textContent = filename;
    toast.style.display = "block";
    clearTimeout(window.toastTimer);
    window.toastTimer = setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

    updateTitleStats();
