<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Madness</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: #e05c2a;
            margin: 10px 0;
        }

       #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 225px;
            background: white;
            border-radius: 16px;
            padding: 10px 16px;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 12px;
        }

        #timer {
            font-size: 1.4em;
            font-weight: 700;
            color: #e05c2a;
            letter-spacing: 0.02em;
        }

        #timer.warning {
            color: #cc0000;
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        #score {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        #end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #end-content {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 300px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        #end-title {
            font-size: 2em;
            margin: 0;
            color: #333;
        }

        #end-stats {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 700;
            color: #333;
        }

        .stat-divider {
            height: 1px;
            background: #eee;
            margin: 4px 0;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }

        #game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-width: 225px;
            width: 100%;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            min-height: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            background-color: white;
            border: 2px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            cursor: pointer;
            text-align: center;
            padding: 0;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        .card.selected {
            border-color: #4a90e2;
            border-width: 3px;
        }

        .card.wrong {
            border-color: red;
            background-color: #ffe0e0;
        }

        .card.matched {
            border-color: #2ecc71;
            background-color: #d4f7e7;
        }

        .card.empty {
            background-color: transparent;
            border: 2px dashed #ccc;
            cursor: default;
        }

        #title-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .mode-button {
            width: 200px;
            padding: 15px;
            font-size: 1.2em;
            border: none;
            border-radius: 8px;
            background-color: #4a90e2;
            color: white;
            cursor: pointer;
        }

        .mode-button:hover {
            background-color: #357abd;
        }

        #preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 460px;
            width: 100%;
            margin-top: 20px;
        }

        .empty-card {
            width: 100%;
            aspect-ratio: 1;
        }
    </style>
</head>
<body>
    <h1>Match Madness</h1>
    <div id="hud">
        <span id="timer">1:45</span>
        <span id="score">Matches: 0</span>
    </div>
    <div id="title-screen">
        <p>Choose a mode to begin!</p>
        <button class="mode-button" onclick="selectMode('noun')">🏠 Noun Mode</button>
        <button class="mode-button" onclick="selectMode('verb')">🏃 Verb Mode</button>
    </div>
    <div id="mode-buttons" style="display:none">
        <button class="mode-button" onclick="launchPreview()">👀 Preview & Play</button>
        <button class="mode-button" onclick="startGame()">▶️ Play</button>
    </div>
    <div id="preview-screen" style="display:none">
        <div id="preview-grid"></div>
        <button class="mode-button" onclick="startGame()" style="margin: 20px 0">▶️ Start Game</button>
    </div>
    <div id="game-board" style="display:none"></div>
    <div id="end-screen" style="display:none">
        <div id="end-content">
            <h2 id="end-title"></h2>
            <div id="end-stats">
                <div class="stat-row">
                    <span class="stat-label">Matches</span>
                    <span class="stat-value" id="end-matches"></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Time Remaining</span>
                    <span class="stat-value" id="end-time"></span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-row">
                    <span class="stat-label">Final Score</span>
                    <span class="stat-value" id="end-score"></span>
                </div>
                <div class="stat-row" id="personal-best-row">
                    <span class="stat-label">Personal Best</span>
                    <span class="stat-value" id="end-personal-best"></span>
                </div>
            </div>
            <button class="mode-button" onclick="resetGame()">Play Again</button>
        </div>
        <canvas id="confetti-canvas" style="display:none"></canvas>
    </div>

    <script src="words.js"></script>
    <script>
        // --- Configuration ---
        const TOTAL_TIME = 105; // 1:45 in seconds
        const NUM_STACKS = 5;
        const ROUND_SIZE = 90; // Must be a multiple of NUM_STACKS

        // --- Game State ---
        let stacks = { images: [], words: [] };
        let selected = null;
        let score = 0;
        let timeLeft = TOTAL_TIME;
        let timerInterval = null;
        let gameActive = false;
        let selectedMode = "noun";
        let round = [];

        function buildRound() {
            const filtered = words.filter(w => w.type === selectedMode);
            round = [];
            for (let i = 0; i < ROUND_SIZE; i++) {
                round.push(filtered[Math.floor(Math.random() * filtered.length)]);
            }
        }

        function buildDeck() {
            const imageDeck = Array.from({ length: NUM_STACKS }, () => []);
            const wordDeck = Array.from({ length: NUM_STACKS }, () => []);

            for (let i = 0; i < round.length; i += NUM_STACKS) {
                const layer = round.slice(i, i + NUM_STACKS);
                const positions = [...Array(NUM_STACKS).keys()].sort(() => Math.random() - 0.5);
                const wordPositions = [...Array(NUM_STACKS).keys()].sort(() => Math.random() - 0.5);

                layer.forEach((item, idx) => {
                    const randomImage = item.images[Math.floor(Math.random() * item.images.length)];
                    imageDeck[positions[idx]].push({
                        word: item.word,
                        file: randomImage.file,
                        accepts: randomImage.accepts || [item.word]
                    });
                    wordDeck[wordPositions[idx]].push({
                        word: item.word,
                        file: randomImage.file,
                        accepts: randomImage.accepts || [item.word]
                    });
                });
            }

            stacks.images = imageDeck;
            stacks.words = wordDeck;
        }

        // --- Render the board ---
        function renderBoard() {
            const board = document.getElementById("game-board");
            board.innerHTML = "";

            // Image columns (left 5)
            for (let i = 0; i < NUM_STACKS; i++) {
                const col = document.createElement("div");
                col.className = "column";

                const card = createImageCard(i);
                col.appendChild(card);
                board.appendChild(col);
            }

        }

        function createImageCard(stackIndex) {
            const stack = stacks.images[stackIndex];
            const div = document.createElement("div");

            if (stack.length === 0) {
                div.className = "card empty";
            } else {
                const item = stack[0];
                div.className = "card";
                div.dataset.type = "image";
                div.dataset.stack = stackIndex;
                div.dataset.word = item.word;
                div.dataset.accepts = JSON.stringify(item.accepts);

                const img = document.createElement("img");
                img.src = item.file;
                div.appendChild(img);
                div.addEventListener("click", () => handleCardClick(div));
            }
            return div;
        }

        function createWordCard(stackIndex) {
            const stack = stacks.words[stackIndex];
            const div = document.createElement("div");

            if (stack.length === 0) {
                div.className = "card empty";
            } else {
                const item = stack[0];
                div.className = "card";
                div.dataset.type = "word";
                div.dataset.stack = stackIndex;
                div.dataset.word = item.word;
                div.textContent = item.word;
                div.dataset.accepts = JSON.stringify(item.accepts);
                div.addEventListener("click", () => handleCardClick(div));
            }
            return div;
        }

        function handleCardClick(card) {
            if (!gameActive) return;
            if (card.classList.contains("empty")) return;
            if (card === selected) {
                // Deselect
                card.classList.remove("selected");
                selected = null;
                return;
            }
            if (selected && selected.dataset.type === card.dataset.type) {
                // Can't select two of the same type
                selected.classList.remove("selected");
                selected = card;
                card.classList.add("selected");
                return;
            }

            if (!selected) {
                selected = card;
                card.classList.add("selected");
            } else {
                // We have two cards of different types selected
                const imageCard = selected.dataset.type === "image" ? selected : card;
                const wordCard = selected.dataset.type === "word" ? selected : card;
                const imageAccepts = JSON.parse(imageCard.dataset.accepts);

                if (imageAccepts.includes(wordCard.dataset.word)) {
                    // Match!
                    handleMatch(selected, card);
                } else {
                    // Mismatch
                    handleMismatch(selected, card);
                }
            }
        }

        function handleMatch(card1, card2) {
            score++;
            document.getElementById("score").textContent = "Matches: " + score;

            // Remove top of each stack
            const imageCard = card1.dataset.type === "image" ? card1 : card2;
            const wordCard = card1.dataset.type === "word" ? card1 : card2;

            card1.classList.add("matched");
            card2.classList.add("matched");

            stacks.images[imageCard.dataset.stack].shift();
            stacks.words[wordCard.dataset.stack].shift();

            selected = null;
            

            setTimeout(() => {
                refreshBoard();
                if (stacks.images.every(s => s.length === 0)) {
                    endGame(true);
                }
            }, 300);
        }

        function handleMismatch(card1, card2) {
            card1.classList.add("wrong");
            card2.classList.add("wrong");
            selected = null;

            setTimeout(() => {
                card1.classList.remove("wrong", "selected");
                card2.classList.remove("wrong", "selected");
            }, 600);
        }

        function refreshBoard() {
            const board = document.getElementById("game-board");
            board.innerHTML = "";

            for (let i = 0; i < NUM_STACKS; i++) {
                board.appendChild(createImageCard(i));
                board.appendChild(createWordCard(i));
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById("timer").textContent =
                    mins + ":" + (secs < 10 ? "0" : "") + secs;

                if (timeLeft <= 20) {
                    document.getElementById("timer").classList.add("warning");
                }

                if (timeLeft <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function endGame(won) {
            gameActive = false;
            clearInterval(timerInterval);

            const finalScore = score + timeLeft;

            // Personal best
            const pbKey = "pb_" + selectedMode;
            const prevBest = parseInt(localStorage.getItem(pbKey)) || 0;
            const isNewBest = finalScore > prevBest;
            if (isNewBest) localStorage.setItem(pbKey, finalScore);

            // Populate end screen
            document.getElementById("end-title").textContent = won ? "🎉 Cleared!" : "😅 Oh no! Time expired!";
            document.getElementById("end-matches").textContent = score;
            document.getElementById("end-time").textContent = timeLeft + "s";
            document.getElementById("end-score").textContent = finalScore;
            document.getElementById("end-personal-best").textContent = 
                isNewBest ? prevBest > 0 ? "New best! 🏆" : "First run! 🏆" : prevBest;

            // Show end screen
            document.getElementById("game-board").style.display = "none";
            document.getElementById("hud").style.display = "none";
            document.getElementById("end-screen").style.display = "flex";

            if (won) launchConfetti();
        }

        // --- Start ---
        function startGame_old(mode) {
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("game-board").style.display = "grid";
            selectedMode = mode;
            buildDeck();
            refreshBoard();
            gameActive = true;
            startTimer();
        }

        function selectMode(mode) {
            selectedMode = mode;
            buildRound();
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("mode-buttons").style.display = "flex";
            document.getElementById("mode-buttons").style.flexDirection = "column";
            document.getElementById("mode-buttons").style.gap = "20px";
        }

        function launchPreview() {
            document.getElementById("mode-buttons").style.display = "none";
            document.getElementById("preview-screen").style.display = "block";
            buildPreviewGrid();
        }

        function startGame() {
            document.getElementById("title-screen").style.display = "none";
            document.getElementById("mode-buttons").style.display = "none";
            document.getElementById("preview-screen").style.display = "none";
            document.getElementById("game-board").style.display = "grid";
            buildDeck();
            refreshBoard();
            gameActive = true;
            startTimer();
        }

        function buildPreviewGrid() {
            const grid = document.getElementById("preview-grid");
            grid.innerHTML = "";

            // Get unique words from round
            const seen = new Set();
            const uniqueWords = round.filter(item => {
                if (seen.has(item.word)) return false;
                seen.add(item.word);
                return true;
            });

            uniqueWords.forEach(item => {
                // Word card
                const wordCard = document.createElement("div");
                wordCard.className = "card";
                wordCard.textContent = item.word;
                grid.appendChild(wordCard);

                // Pick up to 3 random images
                const shuffledImages = [...item.images].sort(() => Math.random() - 0.5);
                const previewImages = shuffledImages.slice(0, 3);

                // Add image cards, pad with empty cells if fewer than 3
                for (let i = 0; i < 3; i++) {
                    if (i < previewImages.length) {
                        const imgCard = document.createElement("div");
                        imgCard.className = "card";
                        const img = document.createElement("img");
                        img.src = previewImages[i].file;
                        imgCard.appendChild(img);
                        grid.appendChild(imgCard);
                    } else {
                        const empty = document.createElement("div");
                        empty.className = "empty-card";
                        grid.appendChild(empty);
                    }
                }
            });
        }


        function launchConfetti() {
            const canvas = document.getElementById("confetti-canvas");
            canvas.style.display = "block";
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = Array.from({ length: 150 }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height,
                size: Math.random() * 8 + 4,
                color: ["#e05c2a", "#4a90e2", "#2ecc71", "#f1c40f", "#e91e63"][Math.floor(Math.random() * 5)],
                speed: Math.random() * 3 + 2,
                angle: Math.random() * Math.PI * 2,
                spin: (Math.random() - 0.5) * 0.2,
                wobble: Math.random() * 0.05
            }));

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                    p.y += p.speed;
                    p.x += Math.sin(p.angle) * 2;
                    p.angle += p.spin;
                    if (p.y > canvas.height) {
                        p.y = -10;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

    function resetGame() {
        // Reset state
        score = 0;
        timeLeft = TOTAL_TIME;
        selected = null;
        gameActive = false;

        // Hide end screen and confetti
        document.getElementById("end-screen").style.display = "none";
        document.getElementById("confetti-canvas").style.display = "none";

        // Reset HUD
        document.getElementById("timer").textContent = "1:45";
        document.getElementById("timer").classList.remove("warning");
        document.getElementById("score").textContent = "Matches: 0";
        document.getElementById("hud").style.display = "flex";

        // Go back to title screen
        document.getElementById("title-screen").style.display = "flex";
        document.getElementById("title-screen").style.flexDirection = "column";
        document.getElementById("game-board").style.display = "none";
    }

    </script>
</body>
</html>
